<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Fibonacci Lean Agile Pointing System</title>
  <meta name="theme-color" content="#213346" />

  <!-- Local assets served from /public at site root via express.static(...) -->
  <link rel="stylesheet" href="/styles.css" />

  <!-- Optional favicons/logo if you have them -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
</head>

<body>
  <noscript>
    <div class="card" style="margin:14px">
      JavaScript is required for FLAPS to work. Please enable JavaScript.
    </div>
  </noscript>

  <header>
    <div class="brand">
      <div class="logo" aria-hidden="true">
        <img class="logoImg" src="/logo.png" alt="" loading="lazy" width="40" height="40" />
      </div>
      <div><h1>Fibonacci Lean Agile Pointing System</h1></div>
    </div>

    <div class="roombar" role="group" aria-label="Room and user controls">
      <label class="vh" for="roomId">Team Name</label>
      <input id="roomId" name="roomId" placeholder="Team Name" autocomplete="organization"
             inputmode="text" aria-label="Team Name" />
      <button id="createRoomBtn" class="primary" type="button">Create Room</button>

      <label class="vh" for="name">Your Name</label>
      <input id="name" name="name" placeholder="Your Name" autocomplete="name"
             inputmode="text" aria-label="Your Name" />
      <button id="joinBtn" class="primary" type="button">Join</button>
    </div>
  </header>

  <main class="grid">
    <!-- Story -->
    <section class="card" aria-labelledby="storyHeader">
      <div class="cardHeader">
        <h2 id="storyHeader">Story</h2>
        <span id="modePill" class="pill" aria-live="polite">Not Connected</span>
      </div>

      <div id="storyView" class="storyView"></div>

      <div class="storyForm">
        <div class="queueHeader">Story Queue</div>
        <div class="queueListWrap">
          <ul id="storyQueueList" class="queueList"></ul>
        </div>

        <label class="vh" for="storyTitle">Story Title</label>
        <input id="storyTitle" placeholder="Story Title" />

        <label class="vh" for="storyDesc">Story Description</label>
        <textarea id="storyDesc" placeholder="Description (optional)"></textarea>

        <label class="vh" for="storyLink">Story Link</label>
        <input id="storyLink" placeholder="Link (optional)" />

        <button id="addToQueueBtn" class="primary" type="button">Add To Queue</button>
        <div id="modHint" class="hint"></div>
      </div>
    </section>

    <!-- Vote -->
    <section class="card" aria-labelledby="voteHeader">
      <div class="cardHeader">
        <h2 id="voteHeader">Vote</h2>
        <span id="votePill" class="pill" aria-live="polite">Waiting</span>
      </div>

      <div id="deck" class="deck" aria-label="Voting deck"></div>

      <div class="controls">
        <button id="revealBtn" class="primary" type="button">Reveal</button>
        <button id="clearBtn" type="button">Clear / Revote</button>
      </div>

      <div class="voteBottom">
        <div class="finalizeRow">
          <select id="finalPointsSelect" aria-label="Final points select"></select>
          <button id="finalizeEstimateBtn" class="primary" type="button">Finalize Estimate</button>
        </div>
        <div id="results" aria-label="Results"></div>
      </div>
    </section>

    <!-- Users -->
    <section class="card" aria-labelledby="usersHeader">
      <div class="cardHeader">
        <h2 id="usersHeader">Users</h2>
        <span id="usersPill" class="pill" aria-live="polite">0</span>
      </div>
      <ul id="usersList" class="users" aria-label="Connected users"></ul>
    </section>

    <!-- Share -->
    <section id="shareBox" class="card share hidden" aria-label="Share links">
      <h2>Share</h2>

      <div class="shareRow">
        <div class="shareLabel">Participant</div>
        <a id="shareParticipant" href="#" target="_blank" rel="noopener noreferrer">—</a>
        <button id="copyParticipantBtn" class="tiny" type="button">Copy</button>
      </div>

      <div class="shareRow">
        <div class="shareLabel">Facilitator</div>
        <a id="shareMod" href="#" target="_blank" rel="noopener noreferrer">—</a>
        <button id="copyModBtn" class="tiny" type="button">Copy</button>
      </div>
    </section>
  </main>

  <!-- Socket.IO client served by your server.js -->
  <script src="/socket.io/socket.io.js" defer></script>
  <script src="/app.js" defer></script>
</body>
</html>
