<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FLAPS — Fibonacci Lean Agile Pointing System</title>

  <!-- Styles: relative path (works when public/ is served at root) -->
  <link rel="stylesheet" href="./styles.css" />

  <!-- Favicons (optional): place these files in public/ or adjust paths -->
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
</head>
<body>
  <header>
    <div class="brand">
      <div class="logo">
        <img class="logoImg" src="./logo.png" alt="App Icon" />
      </div>
      <div><h1>FLAPS — Fibonacci Lean Agile Pointing System</h1></div>
    </div>

    <div class="roombar">
      <button id="createRoomBtn" class="primary">Create Room</button>
      <input id="roomId" placeholder="Team Name" required />
      <input id="name" placeholder="Your Name" />
      <button id="joinBtn">Join</button>
    </div>
  </header>

  <section class="share card" id="shareBox" style="display:none;">
    <div class="shareRow">
      <div class="shareLabel">Participant Link</div>
      <a id="shareParticipant" target="_blank" rel="noreferrer"></a>
      <button class="tiny" id="copyParticipantBtn">Copy</button>
    </div>
    <div class="shareRow">
      <div class="shareLabel">Facilitator Link</div>
      <a id="shareMod" target="_blank" rel="noreferrer"></a>
      <button class="tiny" id="copyModBtn">Copy</button>
    </div>
    <div class="hint">Share the participant link with the team. Keep the facilitator link private to control Reveal/Clear/Story.</div>
  </section>

  <main class="grid">
    <!-- Story / Queue -->
    <section class="card">
      <div class="cardHeader">
        <h2>Story</h2>
        <span id="modePill" class="pill">Not Connected</span>
      </div>

      <div class="storyForm">
        <div class="queueHeader">Story Queue</div>
        <div class="queueControls">
          <button id="addToQueueBtn">Add To Queue</button>
        </div>

        <div class="queueListWrap">
          <ul id="storyQueueList" class="queueList"></ul>
        </div>

        <input id="storyTitle" placeholder="Story Title" />
        <textarea id="storyDesc" placeholder="Description (optional)"></textarea>
        <input id="storyLink" placeholder="Link (optional)" />
        <button id="setStoryBtn" class="primary">Set Story</button>
        <div id="modHint" class="hint"></div>
      </div>

      <div id="storyView" class="storyView"></div>
    </section>

    <!-- Vote -->
    <section class="card">
      <div class="cardHeader">
        <h2>Vote</h2>
        <span id="phasePill" class="pill">—</span>
      </div>

      <div id="deck" class="deck"></div>

      <div class="controls">
        <button id="revealBtn" class="primary">Reveal</button>
        <button id="clearBtn">Clear / Revote</button>
      </div>

      <div class="finalizeRow">
        <select id="finalPointsSelect"></select>
        <button id="finalizeEstimateBtn" class="primary">Finalize Estimate</button>
      </div>

      <div id="results" class="results"></div>
    </section>

    <!-- Participants -->
    <section class="card">
      <div class="cardHeader">
        <h2>Participants</h2>
        <span id="countPill" class="pill">0</span>
      </div>
      <ul id="users" class="users"></ul>
    </section>
  </main>

  <!-- Load Socket.IO client from your Railway backend -->
  <script src="https://flaps-production.up.railway.app/socket.io/socket.io.js"></script>

  <!-- App client code -->
  <script src="./app.js" defer></script>
</body>

</body>
</html>
